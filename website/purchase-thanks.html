<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Satin Alma Talebi Alindi</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .thanks {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    .card {
      background: #fff;
      padding: 3rem;
      border-radius: 20px;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .card h1 { color: #0f172a; margin-bottom: 0.5rem; }
    .card p { color: #64748b; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="thanks">
    <div class="card">
      <h1>Talebiniz Alinmistir</h1>
      <p>Odeme bilgileri asagidadir. Odeme sonrasi dekontu bu e‑postaya yanitlayarak iletebilirsiniz.</p>
      <p style="margin-top:1rem; text-align:left; color:#0f172a; font-weight:600;">
        Alici: Yavuz Mercimek<br>
        IBAN: TR95 0020 5000 0101 8288 4000 08
      </p>
      <p style="margin-top:1rem; font-size:0.9rem; color:#64748b;">
        Odeme onayindan sonra lisans dosyaniz e‑posta ile gonderilecektir.
      </p>
    </div>
  </div>
</body>
</html>
