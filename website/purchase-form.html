<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="E-Defter Klasor Otomasyonu satin alma talep formu. Odeme sonrasi full kurulum ve lisans sureci baslar.">
    <meta name="keywords" content="e-defter satin al, lisans talebi, e-defter otomasyon">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://edefterotomasyon.com.tr/purchase-form.html">
    <title>Satin Alma Talebi - E-Defter Klasor Otomasyonu</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .download-form-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 2rem;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .form-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #0f172a;
        }
        .form-header p {
            color: #64748b;
        }
        .flow-note {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.95rem;
            color: #0f172a;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #1f2937;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .form-group textarea {
            min-height: 90px;
            resize: vertical;
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .privacy-note {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-top: 1rem;
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="download-form-container">
        <div class="form-card">
            <div class="form-header">
                <h1>Satin Alma Talebi</h1>
                <p>Talebinizi alalim, odeme sonrasi full kurulum ve lisans sureci baslar.</p>
            </div>

            <div class="flow-note">
                Surec Ozeti: Talep -> Odeme -> Full Kurulum -> Cihaz Kimligi -> Lisans Maili
            </div>

            <form id="purchaseForm" action="https://formsubmit.co/satis@edefterotomasyon.com.tr" method="POST">
                <input type="hidden" name="_subject" value="Yeni Satin Alma Talebi - E-Defter Otomasyon">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_next" value="https://edefterotomasyon.com.tr/purchase-form.html?success=true">
                <input type="hidden" name="_autoresponse" value="Merhaba,\n\nTalebiniz alindi. Satin alma islemine baslamak icin bu maili yanitlayip odeme yapmak istediginizi belirtin. Size odeme bilgilerini ve sonraki adimlari hemen iletecegiz.\n\nOdeme sonrasi full kurulum linki ve cihaz kimligi adimlari paylasilir.\n\nE-Defter Otomasyon">
                <input type="text" name="_honey" style="display:none">

                <div class="form-group">
                    <label for="name">Ad Soyad *</label>
                    <input type="text" id="name" name="Isim" required placeholder="Orn: Ahmet Yilmaz">
                </div>

                <div class="form-group">
                    <label for="email">E-posta Adresi *</label>
                    <input type="email" id="email" name="E-posta" required placeholder="ornek@mail.com">
                </div>

                <div class="form-group">
                    <label for="phone">Telefon (Opsiyonel)</label>
                    <input type="text" id="phone" name="Telefon" placeholder="05xx xxx xx xx">
                </div>

                <div class="form-group">
                    <label for="company">Musteri / Firma *</label>
                    <input type="text" id="company" name="Firma" required placeholder="ABC Muhasebe">
                </div>

                <div class="form-group">
                    <label for="hardware">Cihaz Kimligi (Varsa)</label>
                    <input type="text" id="hardware" name="Cihaz Kimligi" placeholder="64 karakter hash">
                </div>

                <div class="form-group">
                    <label for="note">Not (Opsiyonel)</label>
                    <textarea id="note" name="Not" placeholder="Kisa notunuz varsa yazabilirsiniz"></textarea>
                </div>

                <button type="submit" class="submit-btn">Talebi Gonder</button>

                <p class="privacy-note">
                    Talebiniz alindiktan sonra odeme bilgileri ve sonraki adimlar e-posta ile iletilir.
                </p>
            </form>

            <div class="back-link">
                <a href="index.html">Ana Sayfaya Don</a>
            </div>
        </div>
    </div>
</body>
</html>
